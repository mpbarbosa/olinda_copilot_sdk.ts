# AI Workflow Automation Configuration
# Project: olinda_copilot_sdk.ts
# See: https://github.com/mpbarbosa/ai_workflow.js

project:
  name: 'olinda_copilot_sdk.ts'
  type: 'typescript-library'
  description: 'TypeScript Wrapper Library for GitHub Copilot SDK'
  kind: 'nodejs_api'
  version: '0.10.0'

tech_stack:
  primary_language: 'typescript'
  secondary_languages:
    - 'javascript'
  build_system: 'npm'
  test_framework: 'jest'
  test_runner: 'jest'
  test_command: 'npm test'
  lint_command: 'npm run lint'
  lint_commands:
    javascript: 'npm run lint'
    typescript: 'npm run lint'
  build_command: 'npm run build'
  validate_command: 'npm run validate'

structure:
  source_dirs:
    - src
  test_dirs:
    - test
  docs_dirs:
    - docs
  config_files:
    - .workflow-config.yaml
    - eslint.config.js
    - jest.config.js
    - package.json
    - tsconfig.json
    - tsconfig.esm.json
  artifact_dir: '.ai_workflow'
  exclude_paths:
    - .ai_workflow/logs
    - .ai_workflow/summaries
    - .ai_workflow/backlog
    - .ai_workflow/metrics
    - .ai_workflow/checkpoints
    - .ai_workflow/prompts
    - .ai_workflow/ml_models
    - .ai_workflow/cache
    - .ai_workflow/archive
    - .ai_workflow/archived_docs

# ============================================================================
# AI PERSONAS
# ============================================================================
# Personas selected for this project (TypeScript wrapper library for
# @github/copilot-sdk — CJS + ESM dual output).
#
# ENABLED — matched to this project's stack and characteristics:
#   typescript_reviewer        — TypeScript generics, dual CJS/ESM types, strict mode; step_19
#   documentation_expert       — API docs, README, JSDoc; steps 01, 02, 02_5
#   technical_writer           — markdown quality and doc consolidation; steps 13, 21
#   test_engineer              — jest test review, generation, execution; steps 06-08
#   code_quality_analyst       — ESLint, TypeScript quality; step_10
#   architecture_reviewer      — SDK wrapper design and API surface; steps 00, 05
#   devops_engineer            — npm scripts, deploy.sh, validate script; steps 03, 04
#   dependency_analyst         — @github/copilot-sdk compatibility; step_09
#   git_specialist             — conventional commits, git finalization; step_12
#   async_performance_engineer — async SDK wrapper call patterns; step_20
#   performance_engineer       — API latency, bench script coverage; step_23
#
# DISABLED — not applicable:
#   prompt_engineer         — pure SDK wrapper, no prompt engineering
#   ux_analyst              — no UI layer
#   accessibility_expert    — no HTML/CSS layer
#   aws_serverless_engineer — no AWS infrastructure
#   api_designer            — SDK wrapper, not API designer
#   security_expert         — no auth/secrets management in scope

ai_personas:
  enabled:
    - typescript_reviewer
    - documentation_expert
    - technical_writer
    - test_engineer
    - code_quality_analyst
    - architecture_reviewer
    - devops_engineer
    - dependency_analyst
    - git_specialist
    - async_performance_engineer
    - performance_engineer
  disabled:
    - prompt_engineer
    - ux_analyst
    - accessibility_expert
    - aws_serverless_engineer
    - api_designer
    - security_expert


workflow:
  settings:
    auto_mode: false # skip interactive prompts
    parallel_execution: true # run independent steps in parallel
    smart_execution: true # skip steps based on change detection
    ml_optimize: false # use ML-driven step optimization
    multi_stage: false # progressive validation pipeline
    auto_commit: false # automatically commit workflow artifacts

  # Legacy stage shortcuts (kept for backwards compatibility)
  stages:
    quick:
      enabled: true
    medium:
      enabled: true
    full:
      enabled: true

  steps:

    # PRE-PROCESSING
    - id: step_00
      name: "Pre-Analysis"
      file: "step_00.js"
      description: "Analyze TypeScript library structure, detect changes to src/, test/, and dist/ CJS/ESM outputs"
      phase: 1
      enabled: true
      can_parallelize: false
      dependencies: []
      ai_persona: architecture_reviewer

    # BOOTSTRAP DOCUMENTATION
    - id: step_0b
      name: "Bootstrap Documentation"
      file: "step_0b.js"
      description: "Generate initial documentation for undocumented or poorly documented modules"
      phase: 1
      enabled: true
      can_parallelize: false
      dependencies: [step_00]
      ai_persona: technical_writer

    # DOCUMENTATION & ANALYSIS
    - id: step_01
      name: "Documentation Updates"
      file: "step_01.js"
      description: "Review and update README, API docs, and inline JSDoc for changed TypeScript modules"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_0b]
      ai_persona: documentation_expert

    - id: step_01_5
      name: "Copilot Instructions Validation"
      file: "step_01_5.js"
      description: "Audit and refresh .github/copilot-instructions.md against the live repository facts"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_01]
      ai_persona: documentation_expert

    - id: step_02
      name: "Consistency Analysis"
      file: "step_02.js"
      description: "Check cross-reference consistency between docs, type definitions, and source"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_01_5]
      ai_persona: documentation_expert

    - id: step_02_5
      name: "Documentation Optimization"
      file: "step_02_5.js"
      description: "Optimize and consolidate documentation structure and API reference"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_02]
      ai_persona: technical_writer

    - id: step_03
      name: "Script References"
      file: "step_03.js"
      description: "Validate npm scripts, deploy.sh, bench script, and validate script references"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_02]
      ai_persona: devops_engineer

    # STRUCTURE & CONFIG VALIDATION
    - id: step_04
      name: "Config Validation"
      file: "step_04.js"
      description: "Validate tsconfig.json, package.json dual CJS/ESM exports, and jest configuration"
      phase: 1
      enabled: true
      can_parallelize: true
      dependencies: [step_00]
      ai_persona: devops_engineer

    - id: step_05
      name: "Directory Structure"
      file: "step_05.js"
      description: "Validate src/, test/, dist/ structure and CJS/ESM output organization"
      phase: 1
      enabled: true
      can_parallelize: false
      dependencies: [step_04]
      ai_persona: architecture_reviewer

    # TESTING PHASE
    - id: step_06
      name: "Test Review"
      file: "step_06.js"
      description: "Review jest test coverage for @github/copilot-sdk wrapper functions"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_05]
      ai_persona: test_engineer

    - id: step_07
      name: "Test Generation"
      file: "step_07.js"
      description: "Generate missing unit tests for SDK wrapper and response parsing"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_06]
      ai_persona: test_engineer

    - id: step_08
      name: "Test Execution"
      file: "step_08.js"
      description: "Execute jest test suite and validate coverage thresholds"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_07]
      ai_persona: test_engineer

    # QUALITY PHASE
    - id: step_09
      name: "Dependency Analysis"
      file: "step_09.js"
      description: "Audit npm dependencies including @github/copilot-sdk version compatibility"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_08]
      ai_persona: dependency_analyst

    - id: step_10
      name: "Code Quality"
      file: "step_10.js"
      description: "Run ESLint, check TypeScript strict mode compliance, review code quality patterns"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_09]
      ai_persona: code_quality_analyst

    # SPECIALIZED ANALYSIS
    - id: step_13
      name: "Markdown Lint"
      file: "step_13.js"
      description: "Lint and fix README.md and API documentation markdown files"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_10]
      ai_persona: technical_writer

    - id: step_19
      name: "TypeScript Review"
      file: "step_19.js"
      description: "Review TypeScript generics, SDK type mappings, and dual CJS/ESM type declarations"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_10]
      dependency_comment: "step_18 remains disabled for this SDK wrapper unless we are actively debugging; TypeScript review should still run after code quality."
      ai_persona: typescript_reviewer

    - id: step_20
      name: "Async Performance Review"
      file: "step_20.js"
      description: "Review async/await patterns and Promise handling in @github/copilot-sdk wrapper calls"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_19]
      ai_persona: async_performance_engineer

    - id: step_18
      name: "Debugging"
      file: "step_18.js"
      description: "Optional debugging step for SDK integration issues"
      phase: 2
      enabled: false
      reason: "Optional debugging step — enable only when investigating SDK integration failures"
      can_parallelize: false
      dependencies: [step_16]
      ai_persona: code_quality_analyst

    - id: step_21
      name: "Doc Consolidation"
      file: "step_21.js"
      description: "Consolidate and deduplicate API reference documentation"
      phase: 2
      enabled: true
      can_parallelize: true
      dependencies: [step_02_5]
      ai_persona: documentation_expert

    - id: step_22
      name: "Accessibility Review"
      file: "step_22.js"
      description: "HTML/CSS accessibility review for web-facing components"
      phase: 2
      enabled: false
      reason: "TypeScript SDK wrapper library with no HTML/CSS layer"
      can_parallelize: true
      dependencies: [step_21]
      ai_persona: accessibility_expert

    - id: step_23
      name: "Performance Review"
      file: "step_23.js"
      description: "Performance review: @github/copilot-sdk API call latency, request batching, response parsing efficiency; bench script coverage"
      phase: 2
      enabled: false
      reason: "The web-facing accessibility/performance branch is intentionally disabled for this SDK wrapper; async performance review remains enabled."
      can_parallelize: true
      dependencies: [step_22]
      ai_persona: performance_engineer

    # CONTEXT ANALYSIS
    - id: step_11
      name: "Context Analysis"
      file: "step_11.js"
      description: "Analyze project context, cross-module relationships, and API surface completeness"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_13]
      ai_persona: architecture_reviewer

    - id: step_11_5
      name: "AWS LBS Validation"
      file: "step_11_5.js"
      description: "Validate AWS load-balancer/serverless deployment details when the project includes that infrastructure"
      phase: 2
      enabled: false
      reason: "This TypeScript SDK wrapper repository does not ship AWS LBS deployment assets."
      can_parallelize: true
      dependencies: [step_11]
      ai_persona: devops_engineer

    - id: step_11_6
      name: "AWS Serverless Review"
      file: "step_11_6.js"
      description: "Review AWS serverless deployment readiness when the project includes that infrastructure"
      phase: 2
      enabled: false
      reason: "This TypeScript SDK wrapper repository has no AWS serverless deployment surface."
      can_parallelize: true
      dependencies: [step_11_5]
      ai_persona: devops_engineer

    - id: step_14
      name: "Prompt Engineering"
      file: "step_14.js"
      description: "Review and optimize prompt assets when the repository owns prompt logic"
      phase: 2
      enabled: false
      reason: "This SDK wrapper is not a prompt-heavy application and does not need a dedicated prompt-engineering pass."
      can_parallelize: true
      dependencies: [step_13]
      ai_persona: technical_writer

    - id: step_15
      name: "UX Analysis"
      file: "step_15.js"
      description: "Review UX flows and ergonomics for user-facing interfaces"
      phase: 2
      enabled: false
      reason: "This package has no UI layer or end-user interaction surface."
      can_parallelize: true
      dependencies: [step_14]
      ai_persona: documentation_expert

    # FINALIZATION
    - id: step_16
      name: "Version Update"
      file: "step_16.js"
      description: "Update version in package.json and CHANGELOG.md for release"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_03]
      ai_persona: devops_engineer

    - id: step_17
      name: "Workflow Summary"
      file: "step_17.js"
      description: "Generate workflow execution summary and metrics report"
      phase: 2
      enabled: true
      can_parallelize: false
      dependencies: [step_03, step_20]
      dependency_comment: "AWS serverless and accessibility/performance terminal branches are intentionally disabled for this SDK wrapper; the summary should wait for script validation and async performance review instead."
      ai_persona: technical_writer

    # GIT FINALIZATION
    - id: step_0f
      name: "Commit Artifacts"
      file: "step_0f.js"
      description: "Commit workflow artifacts, docs, and generated files"
      phase: 3
      enabled: true
      can_parallelize: false
      dependencies: [step_17]
      ai_persona: git_specialist

    # Git Finalization MUST BE LAST
    - id: step_12
      name: "Git Finalization"
      file: "step_12.js"
      description: "Stage, commit, and push with conventional commit message"
      phase: 3
      enabled: true
      can_parallelize: false
      dependencies: [step_0f]
      ai_persona: git_specialist
deploy:
  description: 'Build, publish olinda_copilot_sdk.ts to npm, and tag the release'
  script: 'scripts/deploy.sh'
  cdn_fallback:
    description: 'Build and tag olinda_copilot_sdk.ts for CDN delivery (npm publish skipped)'
    env:
      SKIP_NPM_PUBLISH: 'true'

version:
  config_files:
    - package.json
    - package-lock.json
  required_files:
    - CHANGELOG.md

skills:
  version_sync:
    command: 'npm install --package-lock-only'
    check_command: 'npm run validate'
    description: 'Refresh package-lock metadata after version bumps and verify the project still type-checks'
