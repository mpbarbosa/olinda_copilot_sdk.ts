# update-olinda-utils.yml
# Checks for a new olinda_utils.js release on GitHub and updates the tarball
# CDN URL in package.json, installs dependencies, validates TypeScript, runs
# tests, adjusts related code/docs/tests, and opens a pull request.
#
# olinda_utils.js is consumed via its GitHub tarball CDN — the same pattern
# used for other GitHub-hosted dependencies in this project.
#
# Triggers:
#   - Weekly schedule (Monday 09:00 UTC)
#   - workflow_dispatch — pin to a specific version or force a refresh

name: Update olinda_utils.js

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: |
          olinda_utils.js tag to update to (e.g. v0.4.0).
          Leave blank to use the latest published release.
        required: false
        default: ''

permissions:
  contents: write        # push update branch
  pull-requests: write   # open / update PR

# Prevent concurrent runs from racing on the same PR branch.
# cancel-in-progress: false queues the second run rather than dropping it,
# ensuring every scheduled or manual trigger is eventually processed.
concurrency:
  group: update-olinda-utils
  cancel-in-progress: false

jobs:
  update-olinda-utils:
    name: Check & Update olinda_utils.js
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: npm

      # ── 3. Resolve target version ─────────────────────────────────────────────
      - name: Resolve target olinda_utils.js version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION#v}"
            TAG="v${VERSION}"
            echo "Source: workflow_dispatch input"
          else
            TAG="$(gh api repos/mpbarbosa/olinda_utils.js/releases/latest --jq '.tag_name // empty' 2>/dev/null || true)"
            [[ "${TAG}" =~ ^v[0-9] ]] || TAG=""
            if [[ -n "${TAG}" ]]; then
              echo "Source: GitHub latest release"
            else
              TAG="$(gh api repos/mpbarbosa/olinda_utils.js/tags --jq '.[0].name' 2>/dev/null || true)"
              [[ -n "${TAG}" ]] || { echo "❌  Could not determine latest olinda_utils.js tag." >&2; exit 1; }
              echo "Source: GitHub latest tag (no published release)"
            fi
            VERSION="${TAG#v}"
          fi

          TARBALL_URL="https://github.com/mpbarbosa/olinda_utils.js/archive/refs/tags/${TAG}.tar.gz"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "tarball_url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"
          echo "ℹ️  Target: olinda_utils.js ${TAG}"
          echo "ℹ️  Tarball: ${TARBALL_URL}"

      # ── 4. Check current version ──────────────────────────────────────────────
      - name: Check current olinda_utils.js version in package.json
        id: current
        run: |
          CURRENT_URL="$(node -p "require('./package.json').dependencies?.['olinda_utils.js'] ?? ''")"
          echo "current_url=${CURRENT_URL}" >> "$GITHUB_OUTPUT"

          TARGET_URL="${{ steps.resolve.outputs.tarball_url }}"

          if [[ "${CURRENT_URL}" == "${TARGET_URL}" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "✅  olinda_utils.js is already at ${{ steps.resolve.outputs.tag }} — nothing to do."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            if [[ -z "${CURRENT_URL}" ]]; then
              echo "ℹ️  olinda_utils.js is not yet a dependency — will add it."
            else
              echo "ℹ️  Updating olinda_utils.js:  ${CURRENT_URL}  →  ${TARGET_URL}"
            fi
          fi

      # ── 5. Update package.json ────────────────────────────────────────────────
      - name: Update olinda_utils.js in package.json
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          TARGET_URL="${{ steps.resolve.outputs.tarball_url }}"
          node - <<'EOF'
          const fs  = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.dependencies = pkg.dependencies || {};
          pkg.dependencies['olinda_utils.js'] = process.env.TARGET_URL;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          console.log('✅  package.json updated.');
          EOF
        env:
          TARGET_URL: ${{ steps.resolve.outputs.tarball_url }}

      # ── 6. Install & lock ─────────────────────────────────────────────────────
      - name: Install dependencies (targeted update)
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          npm install "olinda_utils.js@${{ steps.resolve.outputs.tarball_url }}"

      # ── 7. Type-check ─────────────────────────────────────────────────────────
      - name: Validate TypeScript (tsc --noEmit)
        if: steps.current.outputs.up_to_date != 'true'
        run: npm run validate

      # ── 8. Tests ──────────────────────────────────────────────────────────────
      - name: Run unit & integration tests
        if: steps.current.outputs.up_to_date != 'true'
        run: npm test

      # ── 9. Adjust olinda_utils.js related code ────────────────────────────────
      # Scans src/**/*.ts for olinda_utils.js imports and updates any hardcoded
      # version strings from the old tag to the new one. Re-runs tsc to confirm
      # no type errors were introduced by the new olinda_utils.js API surface.
      - name: Adjust olinda_utils.js related code
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          NEW_VERSION="${{ steps.resolve.outputs.version }}"
          OLD_URL="${{ steps.current.outputs.current_url }}"

          OLD_VERSION=""
          if [[ -n "${OLD_URL}" ]]; then
            OLD_VERSION="$(echo "${OLD_URL}" | sed 's|.*/tags/v||; s|\.tar\.gz||')"
          fi

          echo "ℹ️  Scanning src/ for olinda_utils.js imports and version strings…"

          mapfile -t CODE_FILES < <(grep -rl \
            "olinda_utils\|olinda-utils\|from 'olinda\|from \"olinda" \
            src/ 2>/dev/null || true)

          if [[ ${#CODE_FILES[@]} -eq 0 ]]; then
            echo "ℹ️  No olinda_utils.js references found in src/ — nothing to adjust."
          else
            echo "📄  Files with olinda_utils.js references: ${CODE_FILES[*]}"

            if [[ -n "${OLD_VERSION}" && "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
              for f in "${CODE_FILES[@]}"; do
                sed -i "s|${OLD_VERSION}|${NEW_VERSION}|g" "${f}"
                echo "   ✏️  Updated version string in ${f}"
              done
            fi
          fi

          echo "🔍  Re-running TypeScript validation…"
          npm run validate
          echo "✅  TypeScript validation passed after code adjustment."

      # ── 10. Update olinda_utils.js related documentation ──────────────────────
      # Replaces the old tarball URL and version tag in all Markdown files under
      # docs/, and in README.md / CHANGELOG.md.
      - name: Update olinda_utils.js related documentation
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          NEW_VERSION="${{ steps.resolve.outputs.version }}"
          NEW_TAG="${{ steps.resolve.outputs.tag }}"
          NEW_URL="${{ steps.resolve.outputs.tarball_url }}"
          OLD_URL="${{ steps.current.outputs.current_url }}"

          OLD_VERSION=""
          if [[ -n "${OLD_URL}" ]]; then
            OLD_VERSION="$(echo "${OLD_URL}" | sed 's|.*/tags/v||; s|\.tar\.gz||')"
          fi

          echo "ℹ️  Scanning docs/ and root Markdown files for olinda_utils.js references…"

          mapfile -t DOC_FILES < <(find . -name '*.md' \
            ! -path './node_modules/*' \
            ! -path './.ai_workflow/*' \
            -print 2>/dev/null || true)

          UPDATED=0
          for f in "${DOC_FILES[@]}"; do
            if grep -q "olinda_utils\|olinda-utils" "${f}" 2>/dev/null; then
              if [[ -n "${OLD_URL}" ]]; then
                sed -i "s|${OLD_URL}|${NEW_URL}|g" "${f}"
              fi
              if [[ -n "${OLD_VERSION}" && "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
                grep -n "olinda_utils\|olinda-utils" "${f}" | grep -q "${OLD_VERSION}" && \
                  sed -i "/olinda_utils\|olinda-utils/s|${OLD_VERSION}|${NEW_VERSION}|g" "${f}" || true
              fi
              echo "   ✏️  Updated: ${f}"
              UPDATED=$((UPDATED + 1))
            fi
          done

          if [[ ${UPDATED} -eq 0 ]]; then
            echo "ℹ️  No olinda_utils.js references found in documentation — nothing to update."
          else
            echo "✅  Updated ${UPDATED} documentation file(s)."
          fi

      # ── 11. Adjust olinda_utils.js related tests ──────────────────────────────
      # Finds test files that import or mock olinda_utils.js, applies the same
      # version-string replacement as step 9, then re-runs only those test files.
      - name: Adjust olinda_utils.js related tests
        if: steps.current.outputs.up_to_date != 'true'
        run: |
          NEW_VERSION="${{ steps.resolve.outputs.version }}"
          OLD_URL="${{ steps.current.outputs.current_url }}"

          OLD_VERSION=""
          if [[ -n "${OLD_URL}" ]]; then
            OLD_VERSION="$(echo "${OLD_URL}" | sed 's|.*/tags/v||; s|\.tar\.gz||')"
          fi

          echo "ℹ️  Scanning test/ for olinda_utils.js references…"

          mapfile -t TEST_FILES < <(grep -rl \
            "olinda_utils\|olinda-utils\|from 'olinda\|from \"olinda" \
            test/ 2>/dev/null || true)

          if [[ ${#TEST_FILES[@]} -eq 0 ]]; then
            echo "ℹ️  No olinda_utils.js references found in test files — nothing to adjust."
          else
            echo "📄  Test files with olinda_utils.js references: ${TEST_FILES[*]}"

            if [[ -n "${OLD_VERSION}" && "${OLD_VERSION}" != "${NEW_VERSION}" ]]; then
              for f in "${TEST_FILES[@]}"; do
                sed -i "s|${OLD_VERSION}|${NEW_VERSION}|g" "${f}"
                echo "   ✏️  Updated version string in ${f}"
              done
            fi

            echo "🧪  Re-running affected test files…"
            npx jest --passWithNoTests "${TEST_FILES[@]}"
            echo "✅  Affected tests passed after adjustment."
          fi

      # ── 12. Open pull request ─────────────────────────────────────────────────
      - name: Create pull request
        if: steps.current.outputs.up_to_date != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-olinda-utils-${{ steps.resolve.outputs.version }}
          delete-branch: true
          commit-message: |
            chore(deps): update olinda_utils.js to ${{ steps.resolve.outputs.tag }}

            Update olinda_utils.js tarball CDN URL to ${{ steps.resolve.outputs.tag }}.
            URL: ${{ steps.resolve.outputs.tarball_url }}
          title: "chore(deps): update olinda_utils.js to ${{ steps.resolve.outputs.tag }}"
          body: |
            ## olinda_utils.js → ${{ steps.resolve.outputs.tag }}

            Updates the `olinda_utils.js` dependency tarball CDN URL to the latest release.

            | | |
            |---|---|
            | **Previous** | `${{ steps.current.outputs.current_url }}` |
            | **New** | `${{ steps.resolve.outputs.tarball_url }}` |

            ### Checks
            - [x] TypeScript validation (`tsc --noEmit`)
            - [x] Unit & integration tests
            - [x] olinda_utils.js related code adjusted (version strings in `src/` updated, TypeScript re-validated)
            - [x] olinda_utils.js related documentation updated (CDN URLs and version tags in `docs/` and root Markdown files)
            - [x] olinda_utils.js related tests adjusted (version strings in `test/` updated, affected tests re-run)

            > Triggered by: `${{ github.event_name }}`
          labels: dependencies
